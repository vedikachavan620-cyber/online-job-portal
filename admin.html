<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - Job Portal</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      overflow-x:hidden;
      color:white;
    }

    /* ===== Background Video ===== */
    .video-bg{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(10,25,60,0.80);
      z-index:-1;
    }

    header{
      padding:30px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:relative;
    }

    header h3{
      font-size:26px;
    }

    .header-buttons button{
      margin-left:10px;
      padding:8px 14px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
      font-weight:600;
      transition:0.3s;
    }

    .dashboard-btn{
      background:#2f5f9e;
      color:white;
    }

    .dashboard-btn:hover{
      background:#1e3d66;
    }

    .logout-btn{
      background:#e53935;
      color:white;
    }

    .logout-btn:hover{
      background:#c62828;
    }

    .container{
      padding:20px 60px 60px 60px;
    }

    .form-box{
      background:white;
      color:black;
      padding:25px;
      border-radius:14px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      margin-bottom:30px;
    }

    .form-box h3{
      margin-bottom:15px;
      color:#2f5f9e;
    }

    .form-box input{
      padding:10px;
      margin:6px;
      border-radius:8px;
      border:1px solid #ccc;
      min-width:200px;
    }

    .form-box button{
      padding:8px 16px;
      background:#2f5f9e;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .form-box button:hover{
      background:#1e3d66;
    }

    #adminJobs{
      margin-top:20px;
    }

    .job-card{
      background:white;
      color:black;
      padding:18px;
      border-radius:12px;
      margin-bottom:15px;
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
    }

    .job-card h4{
      color:#2f5f9e;
      margin-bottom:8px;
    }

    .delete-btn{
      margin-top:10px;
      padding:6px 12px;
      background:#e53935;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .delete-btn:hover{
      background:#c62828;
    }

  </style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop class="video-bg">
  <source src="jobs1.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<header>
  <h3>Welcome Admin, <span id="adminName"></span></h3>

  <div class="header-buttons">
    <button class="dashboard-btn" onclick="goDashboard()">User Dashboard</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <div class="form-box">
    <h3>Add New Job</h3>
    <input type="text" id="jobTitle" placeholder="Job Title">
    <input type="text" id="company" placeholder="Company">
    <input type="text" id="location" placeholder="Location">
    <input type="text" id="salary" placeholder="Salary (Eg: ₹5 LPA)">
    <button onclick="addJob()">Add Job</button>
  </div>

  <h3>All Jobs</h3>
  <div id="adminJobs"></div>

</div>

<script>
  /* ===== ROLE PROTECTION ===== */
  const role = localStorage.getItem("role");

  if(role !== "admin"){
    window.location.href = "index.html";
  }

  // Show admin name
  document.getElementById("adminName").innerText =
    localStorage.getItem("username");

  function goDashboard(){
    window.location.href = "dashboard.html";
  }

  function logout(){
    localStorage.clear();
    window.location.href = "index.html";
  }
</script>

<script src="js/admin.js"></script>

</body>

</html>
