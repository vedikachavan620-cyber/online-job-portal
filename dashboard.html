<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      overflow-x:hidden;
      color:white;
    }

    /* ===== Background Video ===== */
    .video-bg{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    .overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(10,25,60,0.75);
      z-index:-1;
    }

    /* ===== Top Section ===== */
    .top-section{
      padding:60px 60px 20px 60px;
      position:relative;
    }

    .welcome{
      font-size:28px;
      font-weight:600;
      margin-bottom:25px;
    }

    /* Logout Button */
    .logout-btn{
      position:absolute;
      top:50px;
      right:60px;
      background:#e53935;
      color:white;
      border:none;
      padding:8px 14px;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
      transition:0.3s;
    }

    .logout-btn:hover{
      background:#c62828;
    }

    /* ===== Filters ===== */
    .filters{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .filters input,
    .filters select{
      padding:12px 18px;
      border-radius:12px;
      border:2px solid #fff;
      outline:none;
      font-size:14px;
      min-width:220px;
    }

    .filters select{
      background:white;
      color:black;
    }

    /* ===== Jobs Section ===== */
    #jobs{
      padding:30px 60px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:20px;
    }

    .job-card{
      background:white;
      color:black;
      padding:20px;
      border-radius:14px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    .job-card:hover{
      transform:translateY(-6px);
    }

    .job-card h4{
      margin-bottom:8px;
      color:#2f5f9e;
    }

    .job-card p{
      font-size:14px;
      margin:5px 0;
    }

    .apply-btn{
      margin-top:10px;
      padding:8px 14px;
      background:#2f5f9e;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .apply-btn:hover{
      background:#1e3d66;
    }

  </style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop class="video-bg">
  <source src="jobs1.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="top-section">

  <div class="welcome">
    Welcome, <span id="username"></span>
  </div>

  <button class="logout-btn" onclick="logout()">Logout</button>

  <div class="filters">
    <input type="text" id="search" placeholder="Search Job..." onkeyup="renderJobs()">

    <select id="location" onchange="renderJobs()">
      <option value="">All Locations</option>
      <option>Chennai</option>
      <option>Bangalore</option>
      <option>Hyderabad</option>
      <option>Mumbai</option>
      <option>Delhi</option>
      <option>Pune</option>
    </select>
  </div>

</div>

<div id="jobs"></div>

<script>
  // ===== ROLE PROTECTION =====
  const role = localStorage.getItem("role");

  if(role === "admin"){
    window.location.href = "admin.html";   // Redirect admin away
  }

  if(role !== "user"){
    window.location.href = "index.html";   // Not logged in
  }

  // Show username
  const username = localStorage.getItem("username");
  document.getElementById("username").innerText = username;
</script>

<script src="js/app.js"></script>

</body>

</html>
